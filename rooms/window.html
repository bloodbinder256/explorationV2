<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Endless Requium — Room</title>

  <!-- GLOBAL STYLES -->
  <link rel="stylesheet" href="../styles.css?v=1" />
</head>

<body data-audio="ambient.mp3" data-sanity="high">

  <!-- ======================
       BACKGROUND CONTAINER
       ====================== -->
  <div id="bgContainer">
    <img src="../images/window.png" alt="">
  </div>

  <!-- ======================
       INVENTORY UI
       ====================== -->
  <button id="invToggle">Inventory</button>
  <div id="inventory" class="hidden"></div>

  <!-- ======================
       ROOM CONTENT
       ====================== -->
  <div class="center-box">

    <!-- TITLE -->
    <h1 class="title">A window..</h1>
    <p class="subtitle">"When did it start snowing.. that wasnt on forecast.." you wonder.. you look through the other windows, it's NOT snowing.</p>


    <!-- ===== NAVIGATION ===== -->
    <button class="btn" onclick="goToRoom('corridor1.html')">
      Go Back
    </button>

  </div>

  <!-- ======================
       VISUAL OVERLAYS
       ====================== -->
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>

  <!-- ======================
       SYSTEM SCRIPTS (ORDER MATTERS)
       ====================== -->

  <!-- Core data -->
  <script src="../rooms/items.js?v=1"></script>
  <script src="../rooms/inventory.js?v=1"></script>

  <!-- Gameplay systems -->
  <script src="../rooms/sanity.js?v=1"></script>
  <script src="../rooms/death_unlocks.js?v=1"></script>
  <script src="../rooms/enemies.js?v=1"></script>
  <script src="../rooms/achievements_config.js?v=1"></script>
  <script src="../rooms/trophies.js?v=1"></script>
  <script src="../rooms/rooms_system.js?v=1"></script>

  <!-- Utilities -->
  <script src="../utils.js?v=1"></script>

  <!-- Room handler LAST -->
  <script src="../rooms/content_config.js?v=1"></script>
  <script src="../rooms/settings.js?v=1"></script>
  <script src="../rooms/script.js?v=1"></script>

  <!-- ======================
       INIT
       ====================== -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("fade-in");
});
  </script>

</body>
</html>
