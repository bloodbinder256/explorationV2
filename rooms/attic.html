<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Endless Requium — Attic</title>

  <!-- GLOBAL STYLES -->
  <link rel="stylesheet" href="../styles.css?v=1" />
</head>

<body data-audio="ambient.mp3" data-sanity="high">

  <!-- ======================
       BACKGROUND CONTAINER
       ====================== -->
  <div id="bgContainer">
    <img src="../images/attic.png" alt="">
  </div>

  <!-- ======================
       INVENTORY UI
       ====================== -->
  <button id="invToggle">Inventory</button>
  <div id="inventory" class="hidden"></div>

  <!-- ======================
       ROOM CONTENT
       ====================== -->
  <div class="center-box">

    <!-- TITLE -->
    <h1 class="title">A life left behind..</h1>
    <p class="subtitle">It's a bedroom with a table and window..</p>
    <p>now that you think about it, he didn't have one.. It's getting dark very quick now that you look.</p>
    
<!-- ===== PICKUPS ===== -->
    <button class="btn" onclick="pickupItem('silver_key')">
      Pick up Silver Key
    </button>

    <button class="btn" onclick="pickupItem('master_key', 2)">
      Pick up Master Key
    </button>

    <button class="btn" onclick="pickupItem('rubber_ball', 2)">
      Pick up Rubber Ball
    </button>

    <button class="btn" onclick="pickupItem('wax')">
      Pick up Candle Wax
    </button>

    <button class="btn" onclick="pickupItem('prayer_beads')">
      Pick up Prayer Beads
    </button>

    <!-- ===== NAVIGATION ===== -->
    <button class="btn" onclick="goToRoom('corridor1.html')">
      Go Down The Stairs
    </button>

  </div>

  <!-- ======================
       VISUAL OVERLAYS
       ====================== -->
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>

  <!-- ======================
       SYSTEM SCRIPTS (ORDER MATTERS)
       ====================== -->

  <!-- Core data -->
  <script src="../rooms/items.js?v=1"></script>
  <script src="../rooms/inventory.js?v=1"></script>

  <!-- Gameplay systems -->
  <script src="../rooms/sanity.js?v=1"></script>
  <script src="../rooms/death_unlocks.js?v=1"></script>
  <script src="../rooms/enemies.js?v=1"></script>
  <script src="../rooms/achievements_config.js?v=1"></script>
  <script src="../rooms/trophies.js?v=1"></script>
  <script src="../rooms/rooms_system.js?v=1"></script>

  <!-- Utilities -->
  <script src="../utils.js?v=1"></script>

  <!-- Room handler LAST -->
  <script src="../rooms/content_config.js?v=1"></script>
  <script src="../rooms/settings.js?v=1"></script>
  <script src="../rooms/script.js?v=1"></script>

  <!-- ======================
       INIT
       ====================== -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("fade-in");
});
  </script>

</body>
</html>
