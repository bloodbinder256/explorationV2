<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Endless Requium - Room</title>
  <link rel="stylesheet" href="../styles.css?v=1">
</head>
<body data-audio="ambient.mp3">

  <!-- BACKGROUND IMAGES CONTAINER -->
  <div id="bgContainer">
    <img src="../images/road.png" alt="BG1">
    <img src="../images/trail.png" alt="BG2">
    <img src="../images/door.png" alt="BG3">
    <img src="../images/corridor1.png" alt="BG4">
  </div>

  <!-- INVENTORY -->
  <button id="invToggle">Inventory</button>
  <div id="inventory" class="hidden"></div>

  <!-- CENTERED ROOM CONTENT -->
  <div class="center-box">
    <h1 class="title glitch" data-text="Room Title">Room Title</h1>
    <p class="subtitle">Room description, lore, or instructions go here.</p>

    <!-- Navigation / Pickups -->
    <button class="btn" data-jump="corridor1.html">Go to Next Room</button>
    <button class="btn" data-pickup="silver_key">Pick up Silver Key</button>
    <button class="btn" data-use="silver_key" data-jump="lockedRoom.html">Use Silver Key</button>
  </div>

  <!-- LIGHT OVERLAYS (Optional visual effects) -->
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>

  <!-- ROOM SCRIPT -->
  <script src="../rooms/content_config.js?v=1"></script>
  <script src="../rooms/settings.js?v=1"></script>
  <script src="../rooms/script.js?v=1"></script>
  <script>
    // Ensure body fades in using your CSS fade classes
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("fade-in");
    });
  </script>
</body>
</html>
