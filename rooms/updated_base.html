<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endless Requium — Room</title>

  <!-- GLOBAL STYLES -->
  <link rel="stylesheet" href="../styles.css" />
</head>

<body data-audio="ambient.mp3" data-sanity="high">

  <!-- ======================
       BACKGROUND CONTAINER
       ====================== -->
  <div id="bgContainer">
    <img src="../images/road.png" alt="">
    <img src="../images/trail.png" alt="">
    <img src="../images/door.png" alt="">
    <img src="../images/corridor1.png" alt="">
  </div>

  <!-- ======================
       INVENTORY UI
       ====================== -->
  <button id="invToggle">Inventory</button>
  <div id="inventory" class="hidden"></div>

  <!-- ======================
       ROOM CONTENT
       ====================== -->
  <div class="center-box">

    <!-- TITLE -->
    <h1 class="title">Room Title</h1>
    <p class="subtitle">This place feels wrong.</p>

    <!-- ===== PICKUPS ===== -->
    <button class="btn" onclick="pickupItem('silver_key')">
      Pick up Silver Key
    </button>

    <button class="btn" onclick="pickupItem('metal_scrap', 2)">
      Pick up Metal Scrap
    </button>

    <!-- ===== ITEM USAGE ===== -->
    <button
      class="btn"
      onclick="useItem('silver_key', () => {
        goToRoom('lockedRoom.html');
      })"
    >
      Use Silver Key
    </button>

    <!-- ===== NAVIGATION ===== -->
    <button class="btn" onclick="goToRoom('corridor1.html')">
      Go to Next Room
    </button>

  </div>

  <!-- ======================
       VISUAL OVERLAYS
       ====================== -->
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>

  <!-- ======================
       SYSTEM SCRIPTS (ORDER MATTERS)
       ====================== -->

  <!-- Core data -->
  <script src="../rooms/items.js"></script>
  <script src="../rooms/inventory.js"></script>

  <!-- Gameplay systems -->
  <script src="../rooms/sanity.js"></script>
  <script src="../rooms/death_unlocks.js"></script>
  <script src="../rooms/enemies.js"></script>
  <script src="../rooms/trophies.js"></script>
  <script src="../rooms/rooms_system.js"></script>

  <!-- Utilities -->
  <script src="../utils.js"></script>

  <!-- Room handler LAST -->
  <script src="../rooms/content_config.js"></script>
  <script src="../rooms/script.js"></script>

  <!-- ======================
       INIT
       ====================== -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("fade-in");
});
  </script>

</body>
</html>
