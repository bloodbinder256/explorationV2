<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Requium — Crafting</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { opacity: 1 !important; overflow-y: auto; }
  </style>
</head>

<body class="fade-in crafting-page" data-sanity="high">

  <button id="invToggle" class="btn">Inventory</button>
  <div id="inventory" class="hidden"></div>

  <main class="crafting-shell">
    <section class="crafting-hero">
      <div>
        <p class="eyebrow">Workbench</p>
        <h1 class="title">Crafting Table</h1>
        <p class="subtitle">Build tools, calm your mind, and turn scraps into survival.</p>
      </div>
      <div class="crafting-summary-card">
        <span id="craftingSummary">Loading recipes...</span>
        <small>Crafted items save in your inventory.</small>
      </div>
    </section>

    <section class="crafting-controls">
      <input id="craftingSearch" type="search" placeholder="Search recipes or ingredients...">
      <select id="craftingFilter" aria-label="Filter recipes"></select>
      <button class="btn" onclick="history.back()">⬅ Back</button>
    </section>

    <section id="recipesContainer" class="recipes-grid"></section>
  </main>

  <script src="../rooms/items.js"></script>
  <script src="../rooms/inventory.js"></script>
  <script src="../rooms/sanity.js"></script>
  <script src="../rooms/recipe.js"></script>
  <script src="../rooms/crafting.js"></script>
</body>
</html>
